<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Faculty Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

    <h2>Faculty Management</h2>

    <hr>

    <form id="facultyForm">

        <input type="text" id="faculty_name" class="form-control mb-3" placeholder="Faculty Name" required>

        <input type="text" id="department" class="form-control mb-3" placeholder="Department" required>

        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

        <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number" required>

        <button class="btn btn-primary">

            Add Faculty

        </button>

    </form>

    <br>

    <div id="message"></div>
    <hr>

<h3>Faculty List</h3>

<table border="1" width="100%" id="facultyTable">

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>

    </tbody>

</table>

</div>

<script src="js/faculty.js"></script>

</body>

</html>
