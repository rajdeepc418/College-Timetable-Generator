<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Subjects Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<h1>Subjects Management</h1>

<hr>

<form id="subjectForm">

<div class="mb-3">
<input type="text" id="subject_name" class="form-control" placeholder="Subject Name" required>
</div>

<div class="mb-3">
<input type="number" id="semester" class="form-control" placeholder="Semester" required>
</div>

<div class="mb-3">
<input type="text" id="department" class="form-control" placeholder="Department" required>
</div>

<div class="mb-3">

<label class="form-label">
Faculty
</label>

<div class="mb-3">
<label>Faculty</label>

<select id="faculty_id" class="form-select" required>
    <option value="">Select Faculty</option>
</select>

</div>

<option value="">
Select Faculty
</option>

</select>

</div>

<div class="mb-3">
<input type="number" id="theory_hours" class="form-control" placeholder="Theory Hours" required>
</div>

<div class="mb-3">
<input type="number" id="practical_hours" class="form-control" placeholder="Practical Hours" required>
</div>

<button class="btn btn-success">
Add Subject
</button>

</form>

<br>

<div id="message"></div>

<hr>

<h3>Subject List</h3>

<table class="table table-bordered" id="subjectTable">

<thead>

<tr>

<th>ID</th>
<th>Subject</th>
<th>Semester</th>
<th>Department</th>
<th>Faculty</th>
<th>Theory</th>
<th>Practical</th>
<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script src="js/subject.js"></script>

</body>
</html>
