<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center mb-4">
🎓 College Timetable Dashboard
</h2>

<div class="row g-3">

<div class="col-md-3">
<div class="card bg-primary text-white text-center">
<div class="card-body">
<h5>Total Faculty</h5>
<h2 id="facultyCount">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white text-center">
<div class="card-body">
<h5>Total Subjects</h5>
<h2 id="subjectCount">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-dark text-center">
<div class="card-body">
<h5>Total Rooms</h5>
<h2 id="roomCount">0</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger text-white text-center">
<div class="card-body">
<h5>Total Timetable</h5>
<h2 id="timetableCount">0</h2>
</div>
</div>
</div>

</div>

<hr>

<div class="row mt-4">

<div class="col-md-4">
<a href="faculty.html" class="btn btn-primary w-100 mb-3">Faculty</a>
</div>

<div class="col-md-4">
<a href="subjects.html" class="btn btn-success w-100 mb-3">Subjects</a>
</div>

<div class="col-md-4">
<a href="classrooms.html" class="btn btn-warning w-100 mb-3">Classrooms</a>
</div>

<div class="col-md-4">
<a href="preferences.html" class="btn btn-info w-100 mb-3">Faculty Preferences</a>
</div>

<div class="col-md-4">
<button class="btn btn-danger w-100 mb-3" onclick="generate()">
Generate Timetable
</button>
</div>

<div class="col-md-4">
<a href="timetable.html" class="btn btn-dark w-100 mb-3">
View Timetable
</a>
</div>

</div>

</div>

<script>

fetch("http://localhost:3000/dashboard-stats")
.then(res => res.json())
.then(data => {

document.getElementById("facultyCount").innerHTML = data.faculty;
document.getElementById("subjectCount").innerHTML = data.subjects;
document.getElementById("roomCount").innerHTML = data.rooms;
document.getElementById("timetableCount").innerHTML = data.timetable;

});

function generate(){

fetch("http://localhost:3000/generate-timetable",{

method:"POST"

})
.then(r=>r.json())
.then(()=>{
alert("Timetable Generated Successfully");
});

}

</script>

</body>

</html>
